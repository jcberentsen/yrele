name: Run Pytest

on: [push, pull_request]

jobs:
  test:
    runs-on: python:3.14-slim
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: {python-version: '3.14'}
    - name: Run tests
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
        python3 -m pytest
